name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd MacroLink
          cat > project.yml << 'EOF'
          name: MacroLink
          options:
            bundleIdPrefix: com.phoneremote.keyboard
            deploymentTarget:
              iOS: "16.0"
            generateEmptyDirectories: true

          targets:
            MacroLink:
              type: application
              platform: iOS
              deploymentTarget:
                iOS: "16.0"
              sources:
                - path: MacroLink
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.phoneremote.keyboard.macrolink
                  INFOPLIST_FILE: MacroLink/Info.plist
                  GENERATE_INFOPLIST_FILE: NO
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                  SWIFT_VERSION: "5.0"
                  CODE_SIGNING_ALLOWED: NO
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGN_IDENTITY: ""
                  DEVELOPMENT_TEAM: ""
                  TARGETED_DEVICE_FAMILY: "1,2"
                  ONLY_ACTIVE_ARCH: NO
                  ENABLE_USER_SCRIPT_SANDBOXING: NO
          EOF
          xcodegen generate
          sed -i '' 's/objectVersion = 77/objectVersion = 56/' MacroLink.xcodeproj/project.pbxproj
          ls -la MacroLink.xcodeproj/

      - name: Build iOS app
        run: |
          cd MacroLink
          xcodebuild \
            -project MacroLink.xcodeproj \
            -scheme MacroLink \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ../build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build 2>&1
          
          echo "=== Build result ==="
          find ../build/DerivedData -name "*.app" -type d 2>/dev/null || echo "No .app found"
          echo "=== Products dir ==="
          ls -la ../build/DerivedData/Build/Products/ 2>/dev/null || echo "No Products dir"

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "MacroLink.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: MacroLink.app not found"
            find build/DerivedData -type d -maxdepth 5 2>/dev/null || true
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r MacroLink.ipa Payload/ && cd ..
          ls -lh build/MacroLink.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MacroLink-iOS
          path: build/MacroLink.ipa
          retention-days: 30
