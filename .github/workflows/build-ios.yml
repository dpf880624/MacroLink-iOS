name: Build iOS IPA

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Generate Xcode project
        run: |
          cd ios/MacroLink
          # Generate .xcodeproj from Package.swift
          # Note: generate-xcodeproj is deprecated but still works for simple projects
          swift package generate-xcodeproj 2>/dev/null || true
          
          # If generate-xcodeproj fails, we'll use xcodebuild with -scheme directly
          # SPM on macOS can resolve schemes automatically
          ls -la *.xcodeproj 2>/dev/null || echo "No .xcodeproj generated, will use SPM scheme"

      - name: Build iOS app
        run: |
          cd ios/MacroLink
          
          # Try building with xcodeproj first, then fall back to SPM scheme
          if [ -d "MacroLink.xcodeproj" ]; then
            echo "Building with .xcodeproj..."
            xcodebuild \
              -project MacroLink.xcodeproj \
              -scheme MacroLink \
              -destination 'generic/platform=iOS' \
              -configuration Release \
              -derivedDataPath ../build/DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              TARGETED_DEVICE_FAMILY="1,2" \
              IPHONEOS_DEPLOYMENT_TARGET=16.0 \
              ONLY_ACTIVE_ARCH=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO \
              build
          else
            echo "Building with SPM scheme..."
            xcodebuild \
              -scheme MacroLink \
              -destination 'generic/platform=iOS' \
              -configuration Release \
              -derivedDataPath ../build/DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              TARGETED_DEVICE_FAMILY="1,2" \
              IPHONEOS_DEPLOYMENT_TARGET=16.0 \
              ONLY_ACTIVE_ARCH=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO \
              build
          fi

      - name: Create IPA
        run: |
          cd ios
          
          # Find the built .app
          APP_PATH=$(find build/DerivedData/Build/Products -name "MacroLink.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: MacroLink.app not found in DerivedData"
            echo "Searching for any .app..."
            find build/DerivedData -name "*.app" -type d 2>/dev/null || true
            echo "Listing Build/Products..."
            find build/DerivedData/Build/Products -type d -maxdepth 3 2>/dev/null || true
            exit 1
          fi
          
          echo "Found app: $APP_PATH"
          ls -la "$APP_PATH"
          
          # Create IPA
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r MacroLink.ipa Payload/
          cd ..
          
          echo "IPA created successfully"
          ls -lh build/MacroLink.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroLink-iOS
          path: ios/build/MacroLink.ipa
          retention-days: 30
