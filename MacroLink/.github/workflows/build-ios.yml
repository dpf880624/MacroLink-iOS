name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Generate Xcode project
        run: |
          cd ios/MacroLink
          swift package generate-xcodeproj 2>/dev/null || true
          ls -la *.xcodeproj 2>/dev/null || echo "No .xcodeproj, will use SPM scheme"

      - name: Build iOS app
        run: |
          cd ios/MacroLink
          if [ -d "MacroLink.xcodeproj" ]; then
            xcodebuild -project MacroLink.xcodeproj -scheme MacroLink \
              -destination 'generic/platform=iOS' -configuration Release \
              -derivedDataPath ../build/DerivedData \
              CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" TARGETED_DEVICE_FAMILY="1,2" \
              IPHONEOS_DEPLOYMENT_TARGET=16.0 ONLY_ACTIVE_ARCH=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO build
          else
            xcodebuild -scheme MacroLink \
              -destination 'generic/platform=iOS' -configuration Release \
              -derivedDataPath ../build/DerivedData \
              CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" TARGETED_DEVICE_FAMILY="1,2" \
              IPHONEOS_DEPLOYMENT_TARGET=16.0 ONLY_ACTIVE_ARCH=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO build
          fi

      - name: Create IPA
        run: |
          cd ios
          APP_PATH=$(find build/DerivedData/Build/Products -name "MacroLink.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: MacroLink.app not found"
            find build/DerivedData -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r MacroLink.ipa Payload/ && cd ..
          ls -lh build/MacroLink.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MacroLink-iOS
          path: ios/build/MacroLink.ipa
          retention-days: 30
